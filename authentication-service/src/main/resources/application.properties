# Server port
server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App name
spring.application.name=auth-service

# Security
spring.security.user.name=user
spring.security.user.password=novabank123

# JWT config
jwt.secret=novabankSuperSecretKey123456789012345
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.security.enabled=false

# App info
info.app.name=Authentication Service
info.app.version=1.0.0
info.app.description=NovaBankApp Authentication Service

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.com.novabank=DEBUG
logging.level.web=DEBUG