# Server port
server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App name
spring.application.name=auth-service

# JWT config
jwt.secret=novabankSuperSecretKey123456789012345
jwt.expiration=86400000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=Authentication Service
info.app.version=1.0.0
info.app.description=NovaBankApp Authentication Service

spring.security.user.name=user
spring.security.user.password=novabank123
management.security.enabled=false

# Show all SQL logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Show Spring logs
logging.level.com.novabank=DEBUG

# Show web request logs
logging.level.web=DEBUG